name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: CLI --version
        run: node bin/cli.mjs --version

      - name: CLI --help
        run: node bin/cli.mjs --help

      - name: CLI scan redirect
        run: node bin/cli.mjs scan
        shell: bash

      - name: Run test suite
        if: matrix.node >= 21
        run: npm test
